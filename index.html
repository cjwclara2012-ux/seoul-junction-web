<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Junction | Your Weekend Escape</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-white font-sans">
    <div id="root" class="max-w-xl mx-auto p-4">
        <!-- 갤러리 슬라이더 -->
        <div class="relative w-full aspect-[4/5] bg-gray-900 rounded-2xl overflow-hidden shadow-2xl">
            <img id="main-slider-img" src="https://i.postimg.cc/1X9V5qGz/1.png" alt="Gallery" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-3xl font-bold mt-8">Ditch the Routine,<br>Meet Global Minds</h1>
        
        <!-- 타임라인 섹션 -->
        <div class="mt-8 space-y-4">
            <h2 class="text-xl font-bold">Program Flow / Timeline</h2>
            <div id="timeline-container" class="space-y-2">
                <!-- 타임라인 아이템들이 여기에 동적으로 들어갑니다 -->
            </div>
        </div>
    </div>

    <script>
        // 이미지가 호스팅된 절대 주소로 강제 교체
        const images = [
            "https://i.postimg.cc/1X9V5qGz/1.png",
            "https://i.postimg.cc/7Z9V5qGz/2.png",
            "https://i.postimg.cc/8Z9V5qGz/3.png",
            "https://i.postimg.cc/9Z9V5qGz/4.png",
            "https://i.postimg.cc/0Z9V5qGz/5.png",
            "https://i.postimg.cc/1Z9V5qGz/6.png",
            "https://i.postimg.cc/2Z9V5qGz/7.png",
            "https://i.postimg.cc/3Z9V5qGz/8.png"
        ];
        
        let idx = 0;
        const sliderImg = document.getElementById('main-slider-img');
        
        function updateSlider() {
            sliderImg.src = images[idx];
            idx = (idx + 1) % images.length;
        }
        setInterval(updateSlider, 3000);
    </script>
</body>
</html>
