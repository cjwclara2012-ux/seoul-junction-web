<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Junction | Your Weekend Escape in HK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-glow { box-shadow: 0 0 25px rgba(255, 94, 58, 0.35); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0B0F19] text-slate-100 font-sans overflow-x-hidden antialiased">

    <header class="min-h-screen flex items-center justify-center pt-20 px-4">
        <div class="max-w-4xl text-center">
            <h1 class="text-5xl md:text-7xl font-black text-white mb-6">Ditch the Routine,<br><span class="text-[#FF5E3A]">Meet Global Minds</span></h1>
            
            <div class="bg-white p-4 rounded-2xl shadow-2xl max-w-sm mx-auto">
                <img id="main-slider-img" src="1.png" alt="Gallery" class="w-full aspect-[4/5] object-cover rounded-xl">
            </div>
        </div>
    </header>

    <script>
        const images = ["1.png", "2.png", "3.png", "4.png", "5.png", "6.png", "7.png", "8.png"];
        let idx = 0;
        const sliderImg = document.getElementById('main-slider-img');
        
        function updateSlider() {
            sliderImg.src = images[idx];
            idx = (idx + 1) % images.length;
        }

        setInterval(updateSlider, 3000);
    </script>
</body>
</html>
