<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Junction | Your Weekend Escape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0B0F19; color: white; }
    </style>
</head>
<body class="pb-12">
    <div id="root" class="max-w-xl mx-auto p-4 space-y-8">
        
        <!-- 메인 슬라이더 -->
        <div class="relative w-full aspect-[4/5] bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
            <img id="main-slider-img" 
                 src="./1.png" 
                 alt="Gallery" 
                 class="w-full h-full object-cover transition-opacity duration-500"
                 onerror="this.src='https://placehold.co/600x750/1f2937/ffffff?text=Image+Loading...'">
            <div class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-medium" id="slider-counter">VIBE (1/8)</div>
        </div>
        
        <!-- 헤드라인 -->
        <header>
            <h1 class="text-4xl font-bold leading-tight">Ditch the Routine,<br>Meet Global Minds</h1>
            <p class="mt-4 text-gray-400 text-lg">Tired of superficial clubs and awkward meetups? Escape to our premium language & cultural salon.</p>
        </header>

        <!-- 프로그램 타임라인 -->
        <section class="space-y-4">
            <h2 class="text-2xl font-bold">Program Flow / Timeline</h2>
            <div id="timeline-container" class="space-y-3">
            </div>
        </section>

        <!-- 예약 버튼 -->
        <button class="w-full py-4 bg-orange-600 rounded-xl font-bold text-xl hover:bg-orange-700 transition shadow-lg shadow-orange-900/20 active:scale-[0.98]" 
                onclick="window.location.href='https://wa.me/85254028803'">
            Book Your Weekend Seat →
        </button>
    </div>

    <script>
        const images = ["1.png", "2.png", "3.png", "4.png", "5.png", "6.png", "7.png", "8.png"];
        
        const timelineData = [
            { title: "Arrival & Check-in", desc: "Write your custom name tag" },
            { title: "Settle Down & Name Tag", desc: "Choose your preferred Korean food" },
            { title: "Somaek Ratio Brewing", desc: "Learn the golden ratio" },
            { title: "Sincere Ice-Breaker", desc: "Cheers and fun interactions" },
            { title: "Speak Only in Korean", desc: "Language mission challenges" },
            { title: "Symmetrical Rotation", desc: "Meet new global friends" },
            { title: "Cantonese Exchange", desc: "Learn real local slang" },
            { title: "Photo Session & Contact", desc: "Exchange Instagram/WhatsApp" }
        ];

        // 타임라인 렌더링
        const container = document.getElementById('timeline-container');
        timelineData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = "p-4 bg-gray-800 rounded-xl flex items-center gap-4 border border-gray-700 hover:border-gray-600 transition";
            div.innerHTML = `
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center font-bold text-white shrink-0">${index + 1}</div>
                <div>
                    <h3 class="font-bold">${item.title}</h3>
                    <p class="text-sm text-gray-400">${item.desc}</p>
                </div>
            `;
            container.appendChild(div);
        });

        let idx = 0;
        const sliderImg = document.getElementById('main-slider-img');
        const counter = document.getElementById('slider-counter');
        
        function updateSlider() {
            sliderImg.classList.add('opacity-0');
            setTimeout(() => {
                idx = (idx + 1) % images.length;
                sliderImg.src = images[idx];
                counter.innerText = `VIBE (${idx + 1}/8)`;
                sliderImg.classList.remove('opacity-0');
            }, 500);
        }
        
        setInterval(updateSlider, 3000);
    </script>
</body>
</html>
